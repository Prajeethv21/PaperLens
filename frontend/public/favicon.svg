<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Pixel art Flappy Bird -->
  <!-- Black outline pixels -->
  <rect x="10" y="6" width="2" height="2" fill="#000"/>
  <rect x="12" y="4" width="6" height="2" fill="#000"/>
  <rect x="18" y="6" width="2" height="2" fill="#000"/>
  <rect x="20" y="8" width="2" height="2" fill="#000"/>
  <rect x="22" y="10" width="2" height="2" fill="#000"/>
  
  <!-- Yellow body -->
  <rect x="12" y="6" width="6" height="2" fill="#FFD700"/>
  <rect x="10" y="8" width="10" height="2" fill="#FFD700"/>
  <rect x="8" y="10" width="12" height="8" fill="#FFD700"/>
  <rect x="10" y="18" width="8" height="4" fill="#FFD700"/>
  <rect x="12" y="22" width="4" height="2" fill="#FFD700"/>
  
  <!-- White wing -->
  <rect x="6" y="12" width="2" height="2" fill="#FFF"/>
  <rect x="4" y="14" width="4" height="2" fill="#FFF"/>
  <rect x="6" y="16" width="2" height="2" fill="#FFF"/>
  
  <!-- Blue eye -->
  <rect x="16" y="8" width="2" height="2" fill="#1E40AF"/>
  
  <!-- White eye highlight -->
  <rect x="17" y="8" width="1" height="1" fill="#FFF"/>
  
  <!-- Orange beak -->
  <rect x="20" y="10" width="2" height="2" fill="#FF8C00"/>
  <rect x="22" y="12" width="2" height="2" fill="#FF8C00"/>
  <rect x="24" y="14" width="2" height="2" fill="#FF8C00"/>
  
  <!-- Orange feet -->
  <rect x="10" y="22" width="2" height="2" fill="#FF8C00"/>
  <rect x="14" y="22" width="2" height="2" fill="#FF8C00"/>
  <rect x="8" y="24" width="2" height="2" fill="#FF8C00"/>
  <rect x="12" y="24" width="2" height="2" fill="#FF8C00"/>
  <rect x="16" y="24" width="2" height="2" fill="#FF8C00"/>
</svg>
